name: Build, Test, and Release

on:
  push:
    tags:
      - 'v*'               # запускается при пуше тега вида v1.0.0
  workflow_dispatch:
    inputs:
      os:
        description: 'Выберите ОС для сборки'
        required: true
        default: 'ubuntu-latest'
        type: choice
        options:
          - ubuntu-latest
          - windows-latest
      release_tag:
        description: 
        required: false
        default: ''
        type: string

jobs:
  build:
    strategy:
      matrix:
        # Если ручной запуск — только выбранная ОС, иначе обе
        os: ${{ (github.event_name == 'workflow_dispatch' && fromJSON(format('[["{0}"]]', github.event.inputs.os))) || fromJSON('["ubuntu-latest", "windows-latest"]') }}
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v3

    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y cmake build-essential

    - name: Configure and Build
      working-directory: Creational/Singleton
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release

    - name: Test
      working-directory: Creational/Singleton
      run: ctest --test-dir build --output-on-failure -C Release

    # Сборка deb (только Linux)
    - name: Package DEB
      if: runner.os == 'Linux'
      working-directory: Creational/Singleton
      run: cd build && cpack -G DEB

    # Сборка zip архива с exe (только Windows)
    - name: Package ZIP (Windows)
      if: runner.os == 'Windows'
      working-directory: Creational/Singleton
      run: |
        mkdir artifact
        cp build/Release/singleton.exe artifact/ 2>/dev/null || true
        cp build/Release/test_singleton.exe artifact/ 2>/dev/null || true
        7z a artifact.zip ./artifact/*
      shell: bash

    # Загрузка артефактов для последующего использования
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ runner.os }}-artifacts
        path: |
          Creational/Singleton/build/*.deb
          Creational/Singleton/artifact.zip

    # Определение тега для релиза
    - name: Set release tag
      id: set_tag
      run: |
        if [ "${{ github.event_name }}" = "push" ]; then
          echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        elif [ -n "${{ github.event.inputs.release_tag }}" ]; then
          echo "TAG=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT
        else
          echo "TAG=nightly-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
        fi
      shell: bash

  release:
    needs: build
    if: success() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Display structure of downloaded files
      run: ls -R artifacts

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ needs.build.outputs.set_tag.TAG || 'nightly' }}
        name: Release ${{ needs.build.outputs.set_tag.TAG || 'nightly' }}
        draft: false
        prerelease: ${{ github.event_name == 'workflow_dispatch' }}
        files: |
          artifacts/**/*.deb
          artifacts/**/artifact.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
